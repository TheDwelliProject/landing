name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        name: Lint, typecheck, test, build
        runs-on: ubuntu-latest
        env:
            NEXT_TELEMETRY_DISABLED: "1"
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm lint

            - run: pnpm format:check

            - run: pnpm typecheck

            - run: pnpm test

            - run: pnpm build

    docker:
        name: Docker build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: docker/setup-buildx-action@v3

            - run: docker build .

    staging-deploy:
        name: Deploy to Staging
        runs-on: ubuntu-latest
        container: ghcr.io/railwayapp/cli:latest
        needs: [ci, docker]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        steps:
            - uses: actions/checkout@v6

            - name: Load secrets from 1Password
              id: op-secrets
              uses: 1password/load-secrets-action@v4
              with:
                  export-env: false
              env:
                  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
                  RAILWAY_PROJECT_ID: "op://Dwelli/Staging Creds/RAILWAY_PROJECT_ID"
                  RAILWAY_STAGING_SERVICE_ID: "op://Dwelli/Staging Creds/LANDING_RAILWAY_SERVICE_ID"
                  RAILWAY_STAGING_TOKEN: "op://Dwelli/Staging Creds/RAILWAY_TOKEN"

            - name: Deploy to Railway
              run: |
                  railway up \
                    --project "${{ steps.op-secrets.outputs.RAILWAY_PROJECT_ID }}" \
                    --service "${{ steps.op-secrets.outputs.RAILWAY_STAGING_SERVICE_ID }}" \
                    --environment staging
              env:
                  RAILWAY_TOKEN: ${{ steps.op-secrets.outputs.RAILWAY_STAGING_TOKEN }}
